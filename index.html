<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco-Cola</title>

<style>
body {
    background-color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    flex-direction: column;
    color: white;
    font-family: Arial;
}

.logo {
    font-size: 4em;
    font-weight: bold;
    color: red;
    text-shadow: 2px 2px 5px white;
    margin-bottom: 20px;
}

.box {
    margin: 10px;
}

input {
    padding: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="logo">Coca-Cola</div>

<div class="box">
<input type="email" placeholder="Email">
</div>

<div class="box">
<input type="text" placeholder="Username">
</div>

<div class="box">
<input type="password" placeholder="Password">
</div>

</body>
</html>
